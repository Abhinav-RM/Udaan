<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Udaan Cinematic Reveal</title>
    
    <!-- Load MediaPipe Hands Directly -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 10;
            color: white;
            text-align: center;
        }

        .title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }

        .instruction {
            color: #aaa;
            margin-bottom: 40px;
            max-width: 80%;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 45px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
        }

        #loading-text {
            display: none;
            margin-top: 25px;
            font-size: 1.1rem;
            color: #01ffc3;
            animation: pulse 1.5s infinite;
        }

        #test-btn {
            position: absolute;
            bottom: 25px;
            background: transparent;
            color: #444;
            border: 1px solid #222;
            padding: 8px 18px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
        }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #video { display: none; }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="title">TELEKINESIS REVEAL</div>
        <div class="instruction">Allow camera access.<br>Pinch and hold securely to assemble.<br>Expand hand to disassemble.</div>
        <button id="start-btn" class="btn">Start Experience</button>
        <div id="loading-text">Initializing High Fidelity Tracking...</div>
        <button id="test-btn">x</button>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        // --- 1. CONFIG & STATE ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const logoImg = new Image();
        
        let isImageReady = false;
        logoImg.onload = () => { isImageReady = true; };
        logoImg.src = '1000040550.png'; 

        let width, height, cx, cy;
        let isTesting = false;
        let state = 'START'; 
        
        let handState = 'NONE'; // Can be 'PINCH', 'EXPAND', or 'NONE'
        let assembleProgress = 0; 
        let currentHandDist = 0.15;
        let lastHandSeen = 0;

        let hasSpawnedBirds = false;
        let flashAlpha = 0; 

        const hindiChars = ['अ','आ','इ','ई','उ','ऊ','ए','ऐ','ओ','औ','क','ख','ग','घ','च','छ','ज','झ','ट','ठ','ड','ढ','त','थ','द','ध','न','प','फ','ब','भ','म','य','र','ल','व','श','ष','स','ह'];
        const neonColors = ['#ff2a6d', '#05d9e8', '#01ffc3', '#d1f7ff', '#9d00ff'];
        
        let entities = [];
        let activeBirds = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cx = width / 2;
            cy = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        const birdSpawns = [
            // Top Right Cluster (from original logo)
            { rx: 0.24, ry: -0.24, angle: 1.0, speed: 2.2 }, 
            { rx: 0.33, ry: -0.25, angle: 1.2, speed: 2.8 }, 
            { rx: 0.40, ry: -0.38, angle: 0.8, speed: 2.4 }, 
            // Bottom Left Cluster (from original logo)
            { rx: -0.22, ry: 0.28, angle: -0.8, speed: 2.2 }, 
            { rx: -0.26, ry: 0.38, angle: -1.0, speed: 2.8 },
            { rx: -0.15, ry: 0.35, angle: -0.6, speed: 2.4 }
        ];

        // --- 2. ENTITIES ---

        class FloatingEntity {
            constructor(type, content, rx = 0, ry = 0, angle = 0) {
                this.type = type; 
                this.content = content; 
                this.rx = rx; 
                this.ry = ry; 
                this.targetAngle = angle;
                
                this.floatX = Math.random() * width;
                this.floatY = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                
                this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                this.baseSize = Math.random() * 20 + 15; 
                this.baseAlpha = Math.random() * 0.4 + 0.2;
                this.flapOffset = Math.random() * Math.PI * 2; 
            }

            update(progress, imgWidth, imgHeight, isLogoLoaded, dt) {
                const ts = dt * 60; 
                this.floatX += this.vx * ts;
                this.floatY += this.vy * ts;

                if (this.floatX < -50) this.floatX = width + 50;
                if (this.floatX > width + 50) this.floatX = -50;
                if (this.floatY < -50) this.floatY = height + 50;
                if (this.floatY > height + 50) this.floatY = -50;

                let drawX = this.floatX;
                let drawY = this.floatY;
                let currentAlpha = this.baseAlpha;
                let currentSize = this.baseSize;
                let currentColor = this.color;

                const easeProg = easeInOutCubic(progress);

                if (this.type !== 'bg') {
                    const targetX = cx + (this.rx * imgWidth);
                    const targetY = cy + (this.ry * imgHeight);
                    drawX = this.floatX + (targetX - this.floatX) * easeProg;
                    drawY = this.floatY + (targetY - this.floatY) * easeProg;
                    
                    if (progress > 0.5) currentColor = '#ffffff';

                    let targetSize = this.baseSize;
                    if (this.type === 'text') targetSize = imgWidth * 0.35;
                    if (this.type === 'diamond') targetSize = imgWidth * 0.018; 
                    if (this.type === 'bird') targetSize = imgWidth * 0.035;

                    currentSize = this.baseSize + (targetSize - this.baseSize) * easeProg;
                    currentAlpha = this.baseAlpha + (1.0 - this.baseAlpha) * easeProg;

                    // Hide completely when logo fully formed
                    if (isLogoLoaded && progress > 0.98) currentAlpha = 0; 
                } else {
                    const angle = Math.atan2(this.floatY - cy, this.floatX - cx);
                    const pushDistance = easeProg * (width * 0.5);
                    drawX = this.floatX + Math.cos(angle) * pushDistance;
                    drawY = this.floatY + Math.sin(angle) * pushDistance;
                    currentAlpha = this.baseAlpha * (1 - easeProg * 1.5);
                }

                if (currentAlpha > 0) {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, Math.min(1, currentAlpha));
                    ctx.fillStyle = currentColor;
                    ctx.shadowColor = currentColor;
                    ctx.shadowBlur = progress > 0.7 ? 15 : 5;

                    if (this.type === 'bird') {
                        ctx.translate(drawX, drawY);
                        ctx.rotate(this.targetAngle * easeProg);
                        const scale = currentSize / 40;
                        ctx.scale(scale, scale);
                        
                        // Flapping strictly scales to 0 as it hits the final shape
                        const flapIntensity = 16 * (1 - easeProg);
                        const flap = Math.sin(Date.now() * 0.012 + this.flapOffset) * flapIntensity;
                        
                        ctx.beginPath();
                        ctx.moveTo(0, -6);
                        ctx.quadraticCurveTo(12, -6 + flap, 20, 8 + flap);
                        ctx.quadraticCurveTo(8, 4, 0, 0);
                        ctx.quadraticCurveTo(-8, 4, -20, 8 + flap);
                        ctx.quadraticCurveTo(-12, -6 + flap, 0, -6);
                        ctx.fill();

                    } else if (this.type === 'diamond') {
                        ctx.translate(drawX, drawY);
                        const r = currentSize * 0.75; 
                        ctx.beginPath();
                        ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0);
                        ctx.closePath();
                        ctx.fill();

                    } else {
                        ctx.font = `bold ${currentSize}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(this.content, drawX, drawY);
                    }
                    ctx.restore();
                }
            }
        }

        class FlyingBird {
            constructor(x, y, angle, speed, birdScale) {
                this.x = x; this.y = y; 
                this.vx = Math.sin(angle) * speed; 
                this.vy = -Math.cos(angle) * speed; 
                this.alpha = 1.0;
                this.scale = birdScale; 
                this.angle = angle; 
                this.flapOffset = Math.random() * Math.PI * 2; 
            }

            update(dt) {
                const ts = dt * 60;
                this.x += this.vx * ts; this.y += this.vy * ts;
                this.alpha -= 0.006 * ts; 
            }

            draw() {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.scale(this.scale, this.scale);
                ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 10;
                
                // Escaping birds ALWAYS flap continuously
                const flap = Math.sin(Date.now() * 0.02 + this.flapOffset) * 16; 
                ctx.beginPath();
                ctx.moveTo(0, -6);
                ctx.quadraticCurveTo(12, -6 + flap, 20, 8 + flap);
                ctx.quadraticCurveTo(8, 4, 0, 0);
                ctx.quadraticCurveTo(-8, 4, -20, 8 + flap);
                ctx.quadraticCurveTo(-12, -6 + flap, 0, -6);
                ctx.fill();
                ctx.restore();
            }
        }

        function initScene() {
            entities = [];
            for (let i = 0; i < 150; i++) {
                const char = hindiChars[Math.floor(Math.random() * hindiChars.length)];
                entities.push(new FloatingEntity('bg', char));
            }
            entities.push(new FloatingEntity('text', 'उ', -0.27, 0.02));
            entities.push(new FloatingEntity('text', 'डा', -0.01, 0.02)); // Using 'डा' (no integrated dot)
            entities.push(new FloatingEntity('text', 'न', 0.28, 0.02));
            entities.push(new FloatingEntity('diamond', null, -0.05, 0.28));
            birdSpawns.forEach(spawn => {
                entities.push(new FloatingEntity('bird', null, spawn.rx, spawn.ry, spawn.angle));
            });
        }

        function spawnFlyingBirds(imgWidth, imgHeight) {
            const birdScale = (imgWidth * 0.035) / 40; 
            birdSpawns.forEach(point => {
                const startX = cx + (imgWidth * point.rx);
                const startY = cy + (imgHeight * point.ry);
                activeBirds.push(new FlyingBird(startX, startY, point.angle, point.speed, birdScale));
            });
        }

        // --- 3. 120Hz LOOP ---
        let lastTime = 0;

        function animate(timestamp) {
            requestAnimationFrame(animate);
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            if (dt > 0.1) dt = 0.016;

            ctx.clearRect(0, 0, width, height);
            
            let imgWidth = Math.min(width * 0.8, 800);
            let imgHeight = imgWidth * 0.5; 
            if (isImageReady && logoImg.naturalWidth > 0) {
                imgHeight = (logoImg.naturalHeight / logoImg.naturalWidth) * imgWidth;
                const maxHeight = height * 0.6;
                if (imgHeight > maxHeight) {
                    imgHeight = maxHeight;
                    imgWidth = (logoImg.naturalWidth / logoImg.naturalHeight) * imgHeight;
                }
            }

            if (state === 'RUNNING') {
                if (!isTesting) {
                    // Reset to NONE if camera lost for 0.5s
                    if (Date.now() - lastHandSeen > 500) {
                        handState = 'NONE';
                    }
                }

                // EXACTLY 4 SECONDS PACING
                const speed = 0.25; 
                
                // Smart State Logic
                if (handState === 'PINCH') {
                    assembleProgress += speed * dt; 
                } else if (handState === 'EXPAND') {
                    assembleProgress -= speed * dt;
                } else if (handState === 'NONE') {
                    // If not fully assembled, gracefully fall apart when let go
                    // If 1.0 (fully assembled), it stays locked until user explicitly EXPANDS
                    if (assembleProgress < 1.0) {
                        assembleProgress -= speed * dt;
                    }
                }
                
                // Strict clamping
                assembleProgress = Math.max(0, Math.min(1, assembleProgress));

                // Fire spawn event exactly upon reaching 1.0
                if (assembleProgress === 1.0 && !hasSpawnedBirds) {
                    flashAlpha = 1.0; 
                    spawnFlyingBirds(imgWidth, imgHeight); 
                    hasSpawnedBirds = true;
                } else if (assembleProgress < 0.90) {
                    // Reset spawn lock if user expands hand significantly
                    hasSpawnedBirds = false; 
                }
            }

            entities.forEach(ent => ent.update(assembleProgress, imgWidth, imgHeight, isImageReady, dt));

            if (assembleProgress > 0.95 && isImageReady && logoImg.naturalWidth > 0) {
                const imgAlpha = (assembleProgress - 0.95) / 0.05;
                
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, imgAlpha));
                ctx.drawImage(logoImg, cx - imgWidth/2, cy - imgHeight/2, imgWidth, imgHeight);
                ctx.restore();

                if (flashAlpha > 0) {
                    ctx.save();
                    ctx.globalAlpha = flashAlpha;
                    ctx.filter = 'brightness(1800%) drop-shadow(0 0 25px #ffffff)';
                    ctx.drawImage(logoImg, cx - imgWidth/2, cy - imgHeight/2, imgWidth, imgHeight);
                    ctx.restore();
                    flashAlpha -= 1.4 * dt; 
                }
            }

            if (flashAlpha < 0) flashAlpha = 0;

            for (let i = activeBirds.length - 1; i >= 0; i--) {
                activeBirds[i].update(dt);
                activeBirds[i].draw();
                if (activeBirds[i].alpha <= 0) activeBirds.splice(i, 1);
            }
        }

        // --- 4. VISION ---
        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const thumb = landmarks[4];
                const index = landmarks[8];
                currentHandDist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                lastHandSeen = Date.now();

                // Advanced Strict Tracking States
                if (currentHandDist < 0.07) {
                    handState = 'PINCH';
                } else if (currentHandDist > 0.12) {
                    handState = 'EXPAND'; // Deliberate expansion needed to break the lock
                }
            }
        }

        async function initCamera() {
            const videoElement = document.getElementById('video');
            const startOverlay = document.getElementById('start-overlay');
            const loadingText = document.getElementById('loading-text');
            const startBtn = document.getElementById('start-btn');

            startBtn.style.display = 'none';
            loadingText.style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', frameRate: { ideal: 60 } } 
                });
                videoElement.srcObject = stream;
                const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
                hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.85, minTrackingConfidence: 0.85});
                hands.onResults(onHandResults);

                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    let lastVTime = -1;
                    const processV = async () => {
                        if (!videoElement.paused && !videoElement.ended) {
                            if (videoElement.currentTime !== lastVTime) {
                                lastVTime = videoElement.currentTime;
                                await hands.send({image: videoElement});
                            }
                        }
                        requestAnimationFrame(processV);
                    };
                    processV(); 
                    startOverlay.style.display = 'none';
                    state = 'RUNNING';
                };
            } catch (err) {
                console.error(err);
                alert("Camera Error. Using Test Mode.");
                startBtn.style.display = 'inline-block';
                loadingText.style.display = 'none';
            }
        }

        // --- 5. INTERACT ---
        function startTestMode() { document.getElementById('start-overlay').style.display = 'none'; state = 'RUNNING'; isTesting = true; }
        
        let initialTDist = null;
        
        window.addEventListener('touchstart', (e) => {
            if (isTesting && e.touches.length === 2) initialTDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        });
        window.addEventListener('touchmove', (e) => {
            if (isTesting && e.touches.length === 2 && initialTDist !== null) {
                const cur = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (cur < initialTDist - 40) handState = 'PINCH';
                else if (cur > initialTDist + 40) handState = 'EXPAND';
            }
        });
        window.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialTDist = null;
                handState = 'NONE';
            }
        });

        // Desktop testing: Left Click = Pinch, Right Click = Expand
        window.addEventListener('mousedown', (e) => { 
            if(isTesting) {
                if (e.button === 0) handState = 'PINCH'; 
                else if (e.button === 2) handState = 'EXPAND'; 
            }
        });
        window.addEventListener('mouseup', () => { if(isTesting) handState = 'NONE'; });
        window.addEventListener('contextmenu', e => { if(isTesting) e.preventDefault(); });
        
        document.getElementById('start-btn').addEventListener('click', initCamera);
        document.getElementById('test-btn').addEventListener('click', startTestMode);
        
        initScene();
        requestAnimationFrame(animate); 
    </script>
</body>
</html>
