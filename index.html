<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#video{position:fixed;opacity:0;pointer-events:none;top:-999px;left:-999px;width:320px;height:240px;}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;}

#startScreen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;gap:36px;
  transition:opacity 1s ease;
}
#logoImg{
  width:min(420px,80vw);
  border-radius:16px;
  box-shadow:0 0 60px rgba(30,60,180,0.4),0 0 120px rgba(30,60,180,0.15);
  animation:floatImg 4s ease-in-out infinite;
}
@keyframes floatImg{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
#startBtn{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-size:18px;
  letter-spacing:8px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.85);
  background:transparent;
  border:1px solid rgba(255,255,255,0.35);
  padding:14px 55px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.5s;
}
#startBtn::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.08) 50%,transparent 70%);
  transform:translateX(-100%);
  transition:transform 0.6s;
}
#startBtn:hover::after{transform:translateX(100%);}
#startBtn:hover{border-color:rgba(255,255,255,0.7);color:#fff;box-shadow:0 0 30px rgba(255,255,255,0.1);}
#startBtn:disabled{opacity:0.4;cursor:not-allowed;}
#subtitle{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-size:11px;
  letter-spacing:4px;
  color:rgba(255,255,255,0.2);
  text-transform:uppercase;
}

#gestureHint{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:3px;
  color:rgba(255,255,255,0.2);text-align:center;z-index:5;
  display:none;pointer-events:none;
  white-space:nowrap;
}
#gestureHint.show{display:block;}
#statusDot{
  position:fixed;top:20px;right:20px;width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.15);z-index:5;display:none;
  transition:background 0.3s;
}
#statusDot.show{display:block;}
#statusDot.pinch{background:rgba(180,220,255,0.8);box-shadow:0 0 10px rgba(180,220,255,0.6);}
#statusDot.expand{background:rgba(255,200,180,0.8);box-shadow:0 0 10px rgba(255,200,180,0.6);}
</style>

<script>
// ═══════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');
const gestureHint = document.getElementById('gestureHint');

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (appState !== 'start' && appState !== 'loading') initPieces();

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let appState = 'start';
let isPinching = false;
let isExpanding = false;
let frameCount = 0;
let FONT_SIZE, FONT;
let wordMeta = {};
let pieces = [];
let particles = [];
let bookLetters = [];
let showBook = false;
let bookPos = { x: 0, y: 0 };
let alignLock = false; // debounce aligned trigger

// ═══════════════════════════════════════════
// PIECE CLASS — individual scattered character
// ═══════════════════════════════════════════
class Piece {
  constructor(char, tx, ty) {
    this.char = char;
    this.tx = tx;
    this.ty = ty;
    this.reset();
  }
  reset() {
    // scatter to random position
    const margin = 80;
    this.x = margin + Math.random() * (W - margin * 2);
    this.y = margin + Math.random() * (H - margin * 2);
    this.vx = (Math.random() - 0.5) * 1.8;
    this.vy = (Math.random() - 0.5) * 1.8;
    this.angle = (Math.random() - 0.5) * 1.4;
    this.va = (Math.random() - 0.5) * 0.008;
    this.alpha = 0.88;
    this.scale = 0.85 + Math.random() * 0.25;
  }
  scatterFrom(cx, cy) {
    const dx = this.x - cx, dy = this.y - cy;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    const speed = 6 + Math.random() * 9;
    this.vx = (dx / d) * speed + (Math.random() - 0.5) * 4;
    this.vy = (dy / d) * speed + (Math.random() - 0.5) * 4;
    this.va = (Math.random() - 0.5) * 0.04;
    this.angle = (Math.random() - 0.5) * 1.6;
    this.scale = 0.8 + Math.random() * 0.3;
  }
  update() {
    if (isPinching && appState !== 'aligned') {
      const ease = 0.065;
      this.x += (this.tx - this.x) * ease;
      this.y += (this.ty - this.y) * ease;
      this.angle += (-this.angle) * ease * 1.2;
      this.scale += (1 - this.scale) * ease;
      this.vx *= 0.7;
      this.vy *= 0.7;
    } else if (isExpanding) {
      this.x += this.vx;
      this.y += this.vy;
      this.angle += this.va;
      this.vx *= 0.97;
      this.vy *= 0.97;
      this.clamp();
    } else {
      // Gentle drift
      this.x += this.vx;
      this.y += this.vy;
      this.angle += this.va * 0.5;
      this.wrapEdges();
    }
  }
  clamp() {
    const pad = 60;
    if (this.x < pad) { this.x = pad; this.vx = Math.abs(this.vx) * 0.6; }
    if (this.x > W - pad) { this.x = W - pad; this.vx = -Math.abs(this.vx) * 0.6; }
    if (this.y < pad) { this.y = pad; this.vy = Math.abs(this.vy) * 0.6; }
    if (this.y > H - pad) { this.y = H - pad; this.vy = -Math.abs(this.vy) * 0.6; }
  }
  wrapEdges() {
    if (this.x < -250) this.x = W + 120;
    if (this.x > W + 250) this.x = -120;
    if (this.y < -120) this.y = H + 60;
    if (this.y > H + 120) this.y = -60;
  }
  isAligned() {
    return Math.abs(this.x - this.tx) < 9 &&
           Math.abs(this.y - this.ty) < 9 &&
           Math.abs(this.angle) < 0.04;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.scale(this.scale, this.scale);
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(200,220,255,0.35)';
    ctx.shadowBlur = 20;
    ctx.font = FONT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(this.char, 0, 0);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════
function drawStar(cx, cy, spikes, outer, inner) {
  const step = Math.PI / spikes;
  let rot = -Math.PI / 2;
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(rot) * outer, cy + Math.sin(rot) * outer);
  for (let i = 0; i < spikes; i++) {
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * inner, cy + Math.sin(rot) * inner);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * outer, cy + Math.sin(rot) * outer);
  }
  ctx.closePath();
  ctx.fill();
}

class Particle {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 60;
    this.y = y + (Math.random() - 0.5) * 30;
    const isStar = Math.random() > 0.55;
    this.isStar = isStar;
    this.vx = (Math.random() - 0.5) * (isStar ? 4 : 9);
    this.vy = -(Math.random() * (isStar ? 3 : 6)) - 0.5;
    this.size = isStar ? (4 + Math.random() * 7) : (1.5 + Math.random() * 3.5);
    this.life = 1;
    this.decay = isStar ? (0.006 + Math.random() * 0.009) : (0.018 + Math.random() * 0.022);
    this.rot = Math.random() * Math.PI * 2;
    this.rotV = (Math.random() - 0.5) * 0.08;
    this.spikes = Math.random() > 0.5 ? 4 : 6;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.07;
    this.vx *= 0.985;
    this.rot += this.rotV;
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life * 0.9);
    ctx.fillStyle = '#ffffff';
    if (this.isStar) {
      ctx.shadowColor = 'rgba(190,215,255,0.9)';
      ctx.shadowBlur = 14;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      drawStar(0, 0, this.spikes, this.size * this.life, this.size * this.life * 0.4);
    } else {
      ctx.shadowColor = 'rgba(210,230,255,0.8)';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ═══════════════════════════════════════════
// BOOK LETTERS (Hindi letters floating up)
// ═══════════════════════════════════════════
const HINDI_LETTERS = ['अ','आ','इ','ई','उ','ऊ','ए','ऐ','ओ','औ','क','ख','ग','घ','च','छ','ज','ट','ड','ण','त','न','प','म','र','ल','व','श','स','ह'];

class BookLetter {
  constructor(bx, by) {
    this.char = HINDI_LETTERS[Math.floor(Math.random() * HINDI_LETTERS.length)];
    this.x = bx + (Math.random() - 0.5) * 55;
    this.y = by;
    this.vx = (Math.random() - 0.5) * 1.2;
    this.vy = -(0.8 + Math.random() * 2.2);
    this.life = 1;
    this.decay = 0.004 + Math.random() * 0.005;
    this.size = 13 + Math.random() * 22;
    this.rot = (Math.random() - 0.5) * 0.35;
    this.rotV = (Math.random() - 0.5) * 0.014;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy -= 0.008;
    this.rot += this.rotV;
    this.life -= this.decay;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life * 0.9);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.font = `bold ${this.size}px 'Noto Sans Devanagari', serif`;
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(160,190,255,0.7)';
    ctx.shadowBlur = 14;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.char, 0, 0);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════
// DRAW OPEN BOOK (SVG-style on canvas)
// ═══════════════════════════════════════════
function drawOpenBook(x, y) {
  const bw = 72, bh = 48;
  ctx.save();
  ctx.translate(x, y);

  // Outer glow
  ctx.shadowColor = 'rgba(210,225,255,0.55)';
  ctx.shadowBlur = 28;

  // Left page
  ctx.fillStyle = 'rgba(240,243,255,0.96)';
  ctx.beginPath();
  ctx.moveTo(0, 3);
  ctx.bezierCurveTo(-bw * 0.35, -2, -bw * 0.75, -7, -bw, -9);
  ctx.lineTo(-bw, bh - 6);
  ctx.bezierCurveTo(-bw * 0.75, bh - 2, -bw * 0.35, bh + 1, 0, bh + 3);
  ctx.closePath();
  ctx.fill();

  // Right page
  ctx.beginPath();
  ctx.moveTo(0, 3);
  ctx.bezierCurveTo(bw * 0.35, -2, bw * 0.75, -7, bw, -9);
  ctx.lineTo(bw, bh - 6);
  ctx.bezierCurveTo(bw * 0.75, bh - 2, bw * 0.35, bh + 1, 0, bh + 3);
  ctx.closePath();
  ctx.fill();

  // Spine
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(100,125,195,0.5)';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, bh + 3);
  ctx.stroke();

  // Page lines (left)
  ctx.strokeStyle = 'rgba(130,150,210,0.28)';
  ctx.lineWidth = 0.9;
  for (let i = 1; i <= 3; i++) {
    const ly = i * bh / 4.2;
    ctx.beginPath();
    ctx.moveTo(-6, ly);
    ctx.bezierCurveTo(-bw * 0.5, ly - 1, -bw * 0.8, ly - 2, -bw + 9, ly - 2.5);
    ctx.stroke();
  }
  // Page lines (right)
  for (let i = 1; i <= 3; i++) {
    const ly = i * bh / 4.2;
    ctx.beginPath();
    ctx.moveTo(6, ly);
    ctx.bezierCurveTo(bw * 0.5, ly - 1, bw * 0.8, ly - 2, bw - 9, ly - 2.5);
    ctx.stroke();
  }

  // Small decorative arc at top (open book curve)
  ctx.strokeStyle = 'rgba(100,125,195,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 2, 12, Math.PI, 0, false);
  ctx.stroke();

  ctx.restore();
}

// ═══════════════════════════════════════════
// INIT PIECES
// ═══════════════════════════════════════════
function initPieces() {
  FONT_SIZE = Math.min(W / 4.8, H / 3.5, 155);
  FONT = `900 ${FONT_SIZE}px 'Noto Sans Devanagari', serif`;
  ctx.font = FONT;
  ctx.textBaseline = 'alphabetic';

  const parts = ['उ', 'ड़ा', 'न'];
  const widths = parts.map(p => ctx.measureText(p).width);
  const totalW = widths.reduce((a, b) => a + b, 0);

  const startX = (W - totalW) / 2;
  const baseY = H * 0.52 + FONT_SIZE * 0.3;

  let cx = startX;
  const targets = parts.map((p, i) => {
    const tx = cx;
    cx += widths[i];
    return { x: tx, y: baseY, w: widths[i] };
  });

  wordMeta = { startX, baseY, totalW, firstW: widths[0] };

  alignLock = false;
  pieces = parts.map((char, i) => new Piece(char, targets[i].x, targets[i].y));
}

// ═══════════════════════════════════════════
// BURST PARTICLES on alignment
// ═══════════════════════════════════════════
function burstParticles(count = 90) {
  for (let i = 0; i < count; i++) {
    const px = wordMeta.startX + Math.random() * wordMeta.totalW;
    const py = wordMeta.baseY - Math.random() * FONT_SIZE * 0.9;
    particles.push(new Particle(px, py));
  }
}

// ═══════════════════════════════════════════
// AMBIENT PARTICLES (continuous when aligned)
// ═══════════════════════════════════════════
function ambientParticles() {
  if (frameCount % 3 === 0) {
    const px = wordMeta.startX + Math.random() * wordMeta.totalW;
    const py = wordMeta.baseY - Math.random() * FONT_SIZE;
    particles.push(new Particle(px, py));
  }
}

// ═══════════════════════════════════════════
// DRAW ALIGNED WORD
// ═══════════════════════════════════════════
function drawAlignedWord() {
  ctx.save();
  ctx.font = FONT;
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(200,220,255,0.5)';
  ctx.shadowBlur = 28;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('उड़ान', wordMeta.startX, wordMeta.baseY);
  ctx.restore();
}

// ═══════════════════════════════════════════
// MAIN RENDER LOOP
// ═══════════════════════════════════════════
function render() {
  requestAnimationFrame(render);
  frameCount++;

  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  if (appState === 'start' || appState === 'loading') return;

  if (appState === 'aligned') {
    // Aligned: full word + effects
    drawAlignedWord();
    ambientParticles();

    if (showBook) {
      // Emit book letters
      if (frameCount % 20 === 0) {
        bookLetters.push(new BookLetter(bookPos.x, bookPos.y));
      }
      bookLetters = bookLetters.filter(l => l.life > 0);
      bookLetters.forEach(l => { l.update(); l.draw(); });
      drawOpenBook(bookPos.x, bookPos.y - 8);
    }
  } else {
    // Scattered / aligning
    pieces.forEach(p => p.update());
    pieces.forEach(p => p.draw());

    // Detect alignment
    if (isPinching && !alignLock && pieces.every(p => p.isAligned())) {
      alignLock = true;
      appState = 'aligned';
      showBook = true;
      bookPos = {
        x: wordMeta.startX + wordMeta.firstW * 0.5,
        y: wordMeta.baseY - FONT_SIZE * 1.05
      };
      burstParticles(100);
    }
  }

  // Particles (always)
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(); });
}

// ═══════════════════════════════════════════
// GESTURE DETECTION (MediaPipe)
// ═══════════════════════════════════════════
function onHandResults(results) {
  isPinching = false;
  isExpanding = false;
  statusDot.className = 'show';

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    return;
  }

  const lm = results.multiHandLandmarks[0];
  const thumb = lm[4], idx = lm[8];
  const palm = lm[0];
  const tips = [lm[4], lm[8], lm[12], lm[16], lm[20]];

  // Pinch distance (normalized 0–1)
  const pinchD = Math.hypot(thumb.x - idx.x, thumb.y - idx.y);

  // Spread: avg fingertip → palm distance
  const spread = tips.reduce((s, t) => s + Math.hypot(t.x - palm.x, t.y - palm.y), 0) / 5;

  if (pinchD < 0.07) {
    isPinching = true;
    statusDot.classList.add('pinch');
    statusDot.classList.remove('expand');
    if (appState === 'scattered') appState = 'aligning';

  } else if (spread > 0.27 && pinchD > 0.15) {
    isExpanding = true;
    statusDot.classList.add('expand');
    statusDot.classList.remove('pinch');

    if (appState === 'aligned') {
      appState = 'scattered';
      showBook = false;
      bookLetters = [];
      particles = [];
      alignLock = false;
      const cx = wordMeta.startX + wordMeta.totalW / 2;
      const cy = wordMeta.baseY - FONT_SIZE / 2;
      // Snap pieces to their target positions first, then scatter
      pieces.forEach(p => {
        p.x = p.tx + (Math.random() - 0.5) * 8;
        p.y = p.ty + (Math.random() - 0.5) * 8;
        p.scatterFrom(cx, cy);
      });
    }
  }
}

// ═══════════════════════════════════════════
// START BUTTON
// ═══════════════════════════════════════════
startBtn.addEventListener('click', async () => {
  startBtn.textContent = 'LOADING...';
  startBtn.disabled = true;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
    video.srcObject = stream;
    await new Promise(res => video.onloadedmetadata = res);

    // Fade start screen
    startScreen.style.opacity = '0';
    setTimeout(() => { startScreen.style.display = 'none'; }, 900);

    appState = 'loading';

    // Wait for Devanagari font
    await document.fonts.ready;
    initPieces();

    // Init MediaPipe Hands
    const hands = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.72,
      minTrackingConfidence: 0.55
    });
    hands.onResults(onHandResults);

    const cam = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 320, height: 240
    });
    await cam.start();

    appState = 'scattered';
    gestureHint.classList.add('show');
    statusDot.classList.add('show');

  } catch (err) {
    startBtn.textContent = 'START';
    startBtn.disabled = false;
    alert('🎥 Camera access required for the telekinesis experience.\nPlease allow camera permissions and try again.');
  }
});

// ═══════════════════════════════════════════
// KICK OFF
// ═══════════════════════════════════════════
requestAnimationFrame(render);
</script>
