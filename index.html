<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>उड़ान · Telekinesis</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#video{position:fixed;opacity:0;pointer-events:none;top:-9999px;left:-9999px;width:640px;height:480px;}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:block;}

#overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:10;pointer-events:none;
  transition:opacity 1.2s ease;
}
#overlay.hidden{opacity:0;pointer-events:none;}

#hindiTitle{
  font-family:'Noto Sans Devanagari',serif;
  font-weight:900;
  font-size:clamp(64px,12vw,130px);
  color:rgba(60,110,255,0.85);
  letter-spacing:4px;
  text-shadow:0 0 60px rgba(60,110,255,0.4),0 0 120px rgba(60,110,255,0.15);
  animation:titlePulse 3s ease-in-out infinite;
  margin-bottom:20px;
  pointer-events:none;
}
@keyframes titlePulse{0%,100%{opacity:0.75;text-shadow:0 0 40px rgba(60,110,255,0.4);}50%{opacity:1;text-shadow:0 0 80px rgba(80,140,255,0.7),0 0 140px rgba(60,110,255,0.3);}}

#punchline{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-style:italic;
  font-size:clamp(12px,1.8vw,16px);
  letter-spacing:5px;
  color:rgba(255,255,255,0.3);
  text-transform:uppercase;
  margin-bottom:52px;
  pointer-events:none;
}

#startBtn{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-size:15px;
  letter-spacing:9px;
  text-transform:uppercase;
  color:rgba(255,255,255,0.7);
  background:transparent;
  border:1px solid rgba(80,130,255,0.45);
  padding:14px 58px;
  cursor:pointer;
  pointer-events:all;
  position:relative;
  overflow:hidden;
  transition:all 0.4s;
}
#startBtn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(80,130,255,0.08),transparent);
  transform:translateX(-100%);transition:transform 0.7s;
}
#startBtn:hover::before{transform:translateX(100%);}
#startBtn:hover{border-color:rgba(100,160,255,0.8);color:#fff;box-shadow:0 0 35px rgba(60,110,255,0.2);}
#startBtn:disabled{opacity:0.35;cursor:not-allowed;}

#hint{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:4px;
  color:rgba(255,255,255,0.18);text-align:center;z-index:5;
  white-space:nowrap;opacity:0;transition:opacity 1s;pointer-events:none;
}
#hint.show{opacity:1;}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="overlay">
  <div id="hindiTitle">उड़ान</div>
  <div id="punchline">pinch your fingers to reveal the magic</div>
  <button id="startBtn">START</button>
</div>
<div id="hint" id="hint">✦ &nbsp; PINCH TO ALIGN &nbsp; · &nbsp; OPEN PALM TO SCATTER &nbsp; ✦</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script>
'use strict';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CORE SETUP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const video   = document.getElementById('video');
const overlay = document.getElementById('overlay');
const startBtn= document.getElementById('startBtn');
const hint    = document.getElementById('hint');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (appState !== 'start') initPieces();
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let appState   = 'start';   // start | scattered | pinching | aligned | expanding
let frame      = 0;
let FONT_SIZE, FONT;
let wordMeta   = {};        // startX, baseY, totalW, firstCharW
let pieces     = [];
let particles  = [];
let bookLetters= [];
let showBook   = false;
let bookPos    = {x:0,y:0};

// Hand tracking state
let handPresent   = false;
let pinching      = false;
let expanding     = false;
let smoothPinch   = null;   // {x,y} smoothed pinch midpoint in screen coords
let smoothPalm    = null;   // {x,y} smoothed palm in screen coords
let expandTimer   = 0;      // frames since expand started

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AMBIENT LETTERS (start screen only)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const DEVANAGARI = ['अ','आ','इ','ई','उ','ऊ','ए','ऐ','ओ','औ','क','ख','ग','घ','च','छ','ज','झ','ट','ठ','ड','ण','त','थ','द','न','प','फ','ब','म','य','र','ल','व','श','स','ह','ू','ी','ा','ं','ः','ृ'];
let ambLetters = [];

class AmbLetter {
  constructor(isSpawn) {
    this.reset(isSpawn);
  }
  reset(fromBottom = false) {
    this.x = Math.random() * W;
    this.y = fromBottom ? H + 40 : Math.random() * H;
    this.char = DEVANAGARI[Math.floor(Math.random() * DEVANAGARI.length)];
    this.sz = 16 + Math.random() * 42;
    this.vy = -(0.35 + Math.random() * 1.1);
    this.vx = (Math.random() - 0.5) * 0.4;
    this.alpha = 0.05 + Math.random() * 0.28;
    this.rot = (Math.random() - 0.5) * 0.5;
    this.rv = (Math.random() - 0.5) * 0.003;
    // Blue palette
    const hue = 210 + Math.random() * 50;
    const sat = 60 + Math.random() * 40;
    const lit = 55 + Math.random() * 30;
    this.color = `hsla(${hue},${sat}%,${lit}%,1)`;
  }
  update() {
    this.x  += this.vx;
    this.y  += this.vy;
    this.rot+= this.rv;
    if (this.y < -60) this.reset(true);
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.font = `bold ${this.sz}px 'Noto Sans Devanagari',serif`;
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 18;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.char, 0, 0);
    ctx.restore();
  }
}

// Spawn initial pool
for (let i = 0; i < 60; i++) ambLetters.push(new AmbLetter(false));

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PARTICLE CLASS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
class Particle {
  constructor(x, y, burst) {
    this.x  = x + (Math.random()-0.5) * (burst ? 120 : 30);
    this.y  = y + (Math.random()-0.5) * 30;
    this.star = Math.random() > 0.5;
    const spd = burst ? (3 + Math.random()*10) : (0.5 + Math.random()*3);
    const ang = Math.random() * Math.PI * 2;
    this.vx = Math.cos(ang) * spd * (Math.random() + 0.3);
    this.vy = Math.sin(ang) * spd - (burst ? 2 : 0.5);
    this.sz   = this.star ? (3+Math.random()*8) : (1.5+Math.random()*3);
    this.life = 1;
    this.decay= this.star ? (0.007+Math.random()*0.01) : (0.02+Math.random()*0.025);
    this.rot  = Math.random()*Math.PI*2;
    this.rv   = (Math.random()-0.5)*0.08;
    this.spikes=Math.random()>0.5?4:5;
  }
  update() {
    this.x  += this.vx;
    this.y  += this.vy;
    this.vy += 0.06;
    this.vx *= 0.98;
    this.rot+= this.rv;
    this.life-= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life * 0.95);
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(210,225,255,0.9)';
    ctx.shadowBlur = 12;
    if (this.star) {
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      star(ctx, 0, 0, this.spikes, this.sz*this.life, this.sz*this.life*0.38);
    } else {
      ctx.beginPath();
      ctx.arc(this.x, this.y, Math.max(0.5, this.sz*this.life), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function star(c,x,y,spk,ro,ri){
  const step=Math.PI/spk; let r=-Math.PI/2;
  c.beginPath(); c.moveTo(x+Math.cos(r)*ro,y+Math.sin(r)*ro);
  for(let i=0;i<spk;i++){r+=step;c.lineTo(x+Math.cos(r)*ri,y+Math.sin(r)*ri);r+=step;c.lineTo(x+Math.cos(r)*ro,y+Math.sin(r)*ro);}
  c.closePath();c.fill();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BOOK LETTERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
class BookLetter {
  constructor(bx,by){
    this.char=DEVANAGARI[Math.floor(Math.random()*DEVANAGARI.length)];
    this.x=bx+(Math.random()-0.5)*60;
    this.y=by;
    this.vx=(Math.random()-0.5)*1.3;
    this.vy=-(1.2+Math.random()*2.5);
    this.sz=14+Math.random()*24;
    this.life=1;
    this.decay=0.005+Math.random()*0.005;
    this.rot=(Math.random()-0.5)*0.4;
    this.rv=(Math.random()-0.5)*0.012;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy;
    this.vy-=0.01; this.rot+=this.rv; this.life-=this.decay;
  }
  draw(){
    ctx.save();
    ctx.globalAlpha=Math.max(0,this.life*0.95);
    ctx.translate(this.x,this.y);ctx.rotate(this.rot);
    ctx.font=`bold ${this.sz}px 'Noto Sans Devanagari',serif`;
    ctx.fillStyle='#ffffff';
    ctx.shadowColor='rgba(180,210,255,0.8)';ctx.shadowBlur=16;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.char,0,0);
    ctx.restore();
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PIECE CLASS — spring physics telekinesis
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
class Piece {
  constructor(char, tx, ty, relX, relY) {
    this.char = char;
    this.tx   = tx;    // absolute target x
    this.ty   = ty;    // absolute target y
    this.relX = relX;  // offset from word center when pinched
    this.relY = relY;
    this.x    = 0;
    this.y    = 0;
    this.vx   = 0;
    this.vy   = 0;
    this.angle= 0;
    this.va   = 0;
    this.scale= 1;
    this.scatter();
  }

  scatter() {
    const m = 100;
    this.x  = m + Math.random()*(W-m*2);
    this.y  = m + Math.random()*(H-m*2);
    this.vx = (Math.random()-0.5)*2.5;
    this.vy = (Math.random()-0.5)*2.5;
    this.angle=(Math.random()-0.5)*1.6;
    this.va  =(Math.random()-0.5)*0.012;
    this.scale= 0.8+Math.random()*0.35;
  }

  explodeFrom(px, py) {
    const dx=this.x-px, dy=this.y-py;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    const speed=14+Math.random()*18;
    this.vx=(dx/d)*speed+(Math.random()-0.5)*8;
    this.vy=(dy/d)*speed+(Math.random()-0.5)*8;
    this.va=(Math.random()-0.5)*0.1;
    this.angle=(Math.random()-0.5)*2.0;
  }

  update() {
    if (appState === 'pinching') {
      // Spring toward pinch point with piece's relative offset
      // STRONG spring so it feels responsive and follows hand instantly
      const gx = smoothPinch.x + this.relX;
      const gy = smoothPinch.y + this.relY;
      const dx = gx - this.x;
      const dy = gy - this.y;
      // Spring: F = k * dx, critically damped
      const k = 0.30;
      const damp = 0.68;
      this.vx = this.vx * damp + dx * k;
      this.vy = this.vy * damp + dy * k;
      this.x += this.vx;
      this.y += this.vy;
      // Snap angle and scale
      this.angle += (0 - this.angle) * 0.22;
      this.scale += (1 - this.scale) * 0.18;

    } else if (appState === 'aligned') {
      // Snap exactly to target
      this.x += (this.tx - this.x) * 0.25;
      this.y += (this.ty - this.y) * 0.25;
      this.angle *= 0.85;
      this.scale += (1 - this.scale) * 0.2;
      this.vx = 0; this.vy = 0;

    } else if (appState === 'expanding') {
      this.x += this.vx;
      this.y += this.vy;
      this.angle += this.va;
      this.vx *= 0.93;
      this.vy *= 0.93;
      this.va *= 0.95;
      this.bounceWalls();

    } else {
      // scattered — gentle organic drift
      this.x += this.vx;
      this.y += this.vy;
      this.angle += this.va;
      this.vx *= 0.994;
      this.vy *= 0.994;
      this.va *= 0.998;
      if (Math.random() < 0.015) {
        this.vx += (Math.random()-0.5)*0.6;
        this.vy += (Math.random()-0.5)*0.6;
      }
      this.wrapEdges();
    }
  }

  bounceWalls() {
    const pad=70;
    if(this.x<pad){this.x=pad;this.vx=Math.abs(this.vx)*0.55;}
    if(this.x>W-pad){this.x=W-pad;this.vx=-Math.abs(this.vx)*0.55;}
    if(this.y<pad){this.y=pad;this.vy=Math.abs(this.vy)*0.55;}
    if(this.y>H-pad){this.y=H-pad;this.vy=-Math.abs(this.vy)*0.55;}
  }

  wrapEdges() {
    const m=FONT_SIZE;
    if(this.x<-m)this.x=W+m*0.5;
    if(this.x>W+m)this.x=-m*0.5;
    if(this.y<-m)this.y=H+m*0.5;
    if(this.y>H+m)this.y=-m*0.5;
  }

  isNearTarget() {
    return Math.abs(this.x-this.tx)<16 && Math.abs(this.y-this.ty)<16 && Math.abs(this.angle)<0.08;
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.scale(this.scale, this.scale);
    ctx.globalAlpha = 0.92;
    ctx.font = FONT;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(210,225,255,0.5)';
    ctx.shadowBlur = 22;
    ctx.fillText(this.char, 0, 0);
    ctx.restore();
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT PIECES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function initPieces() {
  FONT_SIZE = Math.min(W/4.2, H/3.2, 165);
  FONT = `900 ${FONT_SIZE}px 'Noto Sans Devanagari',serif`;
  ctx.font = FONT;
  ctx.textBaseline = 'alphabetic';

  const chars  = ['उ','ड़ा','न'];
  const widths = chars.map(c => ctx.measureText(c).width);
  const totalW = widths.reduce((a,b)=>a+b,0);
  const gap    = FONT_SIZE * 0.0; // no extra gap — natural spacing

  const startX = (W - totalW) / 2;
  const baseY  = H * 0.52 + FONT_SIZE * 0.28;

  // Compute absolute targets + center
  let cx = startX;
  const targets = chars.map((c,i) => { const tx=cx; cx+=widths[i]; return {x:tx,y:baseY}; });
  const wordCenterX = startX + totalW/2;
  const wordCenterY = baseY  - FONT_SIZE*0.35;

  wordMeta = { startX, baseY, totalW, firstCharW: widths[0], wordCenterX, wordCenterY };

  pieces = chars.map((c,i) => new Piece(
    c,
    targets[i].x,
    targets[i].y,
    targets[i].x - wordCenterX,
    targets[i].y - wordCenterY
  ));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DRAW BOOK
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function drawBook(x, y) {
  const bw=68, bh=44;
  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor='rgba(220,230,255,0.6)';
  ctx.shadowBlur=28;
  ctx.fillStyle='rgba(242,245,255,0.97)';
  // Left page
  ctx.beginPath();
  ctx.moveTo(0,2);
  ctx.bezierCurveTo(-bw*0.35,-2,-bw*0.75,-7,-bw,-9);
  ctx.lineTo(-bw,bh-5);
  ctx.bezierCurveTo(-bw*0.75,bh,-bw*0.35,bh+2,0,bh+3);
  ctx.closePath(); ctx.fill();
  // Right page
  ctx.beginPath();
  ctx.moveTo(0,2);
  ctx.bezierCurveTo(bw*0.35,-2,bw*0.75,-7,bw,-9);
  ctx.lineTo(bw,bh-5);
  ctx.bezierCurveTo(bw*0.75,bh,bw*0.35,bh+2,0,bh+3);
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(90,115,200,0.5)';ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,bh+2);ctx.stroke();
  ctx.strokeStyle='rgba(120,145,220,0.22)';ctx.lineWidth=0.9;
  for(let i=1;i<=3;i++){
    const ly=i*bh/4.3;
    ctx.beginPath();ctx.moveTo(-5,ly);ctx.bezierCurveTo(-bw*0.45,ly-1,-bw*0.8,ly-2,-bw+8,ly-2.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(5,ly);ctx.bezierCurveTo(bw*0.45,ly-1,bw*0.8,ly-2,bw-8,ly-2.5);ctx.stroke();
  }
  ctx.strokeStyle='rgba(90,115,200,0.28)';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.arc(0,1,10,Math.PI,0,false);ctx.stroke();
  ctx.restore();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BURST HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function burstAt(x, y, n) {
  for(let i=0;i<n;i++) particles.push(new Particle(x,y,true));
}
function ambientSparkle() {
  if(frame%4===0) {
    const px = wordMeta.startX + Math.random()*wordMeta.totalW;
    const py = wordMeta.baseY - Math.random()*FONT_SIZE;
    particles.push(new Particle(px,py,false));
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER LOOP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let alignFired = false;

function render() {
  requestAnimationFrame(render);
  frame++;

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  // ── START SCREEN canvas layer ──
  if (appState === 'start') {
    ambLetters.forEach(l=>{l.update();l.draw();});
    // Spawn one per frame up to cap
    if(ambLetters.length < 65 && frame%4===0) ambLetters.push(new AmbLetter(true));
    return;
  }

  // ── MAIN EXPERIENCE ──
  pieces.forEach(p=>p.update());
  pieces.forEach(p=>p.draw());

  // Alignment detection: all pieces near absolute target while pinching
  if(appState==='pinching' && !alignFired && pieces.every(p=>p.isNearTarget())){
    alignFired = true;
    appState   = 'aligned';
    showBook   = true;
    bookPos    = {
      x: wordMeta.startX + wordMeta.firstCharW*0.5,
      y: wordMeta.baseY  - FONT_SIZE*1.08
    };
    // Big burst across whole word
    for(let i=0;i<5;i++){
      burstAt(wordMeta.startX + (i/4)*wordMeta.totalW, wordMeta.baseY - FONT_SIZE*0.4, 22);
    }
  }

  // Aligned effects
  if(appState==='aligned'){
    ambientSparkle();
    if(showBook){
      if(frame%22===0) bookLetters.push(new BookLetter(bookPos.x, bookPos.y-8));
      bookLetters=bookLetters.filter(l=>l.life>0);
      bookLetters.forEach(l=>{l.update();l.draw();});
      drawBook(bookPos.x, bookPos.y);
    }
  }

  // Expanding → scattered transition
  if(appState==='expanding'){
    expandTimer++;
    if(expandTimer > 55 && Math.max(...pieces.map(p=>Math.abs(p.vx)+Math.abs(p.vy))) < 3) {
      appState = 'scattered';
    }
  }

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.update();p.draw();});
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HAND RESULTS — MediaPipe callback
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function onHands(res) {
  if(!res.multiHandLandmarks || res.multiHandLandmarks.length===0){
    handPresent=false;
    pinching=false;
    expanding=false;
    return;
  }
  handPresent=true;
  const lm=res.multiHandLandmarks[0];

  // ── Mirrored screen coords (selfie) ──
  const toScreen=(l)=>({ x:(1-l.x)*W, y:l.y*H });

  const thumbTip=toScreen(lm[4]);
  const idxTip  =toScreen(lm[8]);
  const midTip  =toScreen(lm[12]);
  const ringTip =toScreen(lm[16]);
  const pinkyTip=toScreen(lm[20]);
  const palmBase=toScreen(lm[0]);
  const palmMid =toScreen(lm[9]);

  // Pinch distance (normalized, not screen)
  const pinchDist=Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);

  // Spread: avg fingertip to palm-mid distance (normalized)
  const tips=[lm[4],lm[8],lm[12],lm[16],lm[20]];
  const spread=tips.reduce((s,t)=>s+Math.hypot(t.x-lm[9].x,t.y-lm[9].y),0)/5;

  const isPinch = pinchDist < 0.065;
  const isSpread= spread > 0.24 && pinchDist > 0.13;

  // Smooth pinch midpoint — high responsiveness
  const rawPinch = {
    x:(thumbTip.x+idxTip.x)/2,
    y:(thumbTip.y+idxTip.y)/2
  };
  if(!smoothPinch) smoothPinch={...rawPinch};
  const LERP=0.7; // 0.7 = very responsive (70% new each frame)
  smoothPinch.x=smoothPinch.x*(1-LERP)+rawPinch.x*LERP;
  smoothPinch.y=smoothPinch.y*(1-LERP)+rawPinch.y*LERP;

  if(!smoothPalm) smoothPalm={...palmMid};
  smoothPalm.x=smoothPalm.x*0.5+palmMid.x*0.5;
  smoothPalm.y=smoothPalm.y*0.5+palmMid.y*0.5;

  // ── STATE TRANSITIONS ──
  if(isPinch){
    pinching=true; expanding=false;
    if(appState==='scattered') appState='pinching';
    if(appState==='expanding'){ appState='pinching'; alignFired=false; }

  } else if(isSpread){
    expanding=true; pinching=false;
    if(appState==='aligned'){
      appState='expanding';
      expandTimer=0;
      showBook=false;
      bookLetters=[];
      particles=[];
      alignFired=false;
      // Explode from palm center
      pieces.forEach(p=>p.explodeFrom(smoothPalm.x,smoothPalm.y));
    } else if(appState==='pinching'){
      appState='expanding';
      expandTimer=0;
      alignFired=false;
      pieces.forEach(p=>p.explodeFrom(smoothPalm.x,smoothPalm.y));
    }

  } else {
    // Neutral gesture
    pinching=false; expanding=false;
    if(appState==='pinching') appState='scattered';
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// START BUTTON
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
startBtn.addEventListener('click', async()=>{
  startBtn.textContent='LOADING…';
  startBtn.disabled=true;

  try {
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}
    });
    video.srcObject=stream;
    await new Promise(res=>{ video.onloadedmetadata=res; });

    // Fade overlay
    overlay.classList.add('hidden');
    setTimeout(()=>{ overlay.style.display='none'; },1200);

    await document.fonts.ready;
    initPieces();
    appState='scattered';
    hint.classList.add('show');

    // Boot MediaPipe
    const hands=new Hands({
      locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    hands.setOptions({
      maxNumHands:1,
      modelComplexity:1,
      minDetectionConfidence:0.7,
      minTrackingConfidence:0.6
    });
    hands.onResults(onHands);

    const cam=new Camera(video,{
      onFrame:async()=>{ await hands.send({image:video}); },
      width:640, height:480
    });
    await cam.start();

  } catch(err){
    startBtn.textContent='START';
    startBtn.disabled=false;
    alert('🎥 Camera access is required.\nPlease allow camera permissions and try again.');
    console.error(err);
  }
});

// ── Kick off ──
requestAnimationFrame(render);
</script>
</body>
</html>
